<!DOCTYPE html>
<html><head><title>Quality Test</title></head>
<body>
<pre id="out">Running...</pre>
<script type="module">
import JSZip from 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm';
import { parseTVG, resolveExternalPalette } from './src/tvg-parser.ts';
import { scoreCanvasSources } from './src/tvg-benchmark.ts';
import { loadPalettes, flattenExternalPaletteColors } from './src/tpl-palette.ts';
import { renderTVGWithEmbeddedThumbnailFallback } from './src/tvg-preview.ts';
import { parseXStageMetadata, parseElements, TVG_UNITS_PER_FIELD } from './src/tpl-parser.ts';

const SIZE = 160, TOL = 50;
const ZIP = './sample/toon/CH_Anna_rig_football_suit_V001_V07.zip';

async function main() {
  const zip = await JSZip.loadAsync(await (await fetch(ZIP)).arrayBuffer());
  const xstagePath = Object.keys(zip.files).find(f => f.endsWith('/scene.xstage')) || 'scene.xstage';
  const xml = new DOMParser().parseFromString(await zip.file(xstagePath).async('text'), 'text/xml');
  parseXStageMetadata(xml);
  const elements = parseElements(xml);
  const elementMap = new Map(elements.map(element => [element.name, element]));
  const thumbFiles = Object.keys(zip.files).filter(f => f.includes('.thumbnails/') && f.endsWith('.tvg.png'));
  const externalColors = flattenExternalPaletteColors(await loadPalettes(zip));
  const scores = [];

  for (const tp of thumbFiles) {
    const parts = tp.split('/');
    const tn = parts.pop().replace(/^\./, '').replace('.tvg.png', '');
    const elementName = parts[parts.length - 2];
    const ed = parts.slice(0, -1).join('/') + '/';
    const tf = zip.file(ed + tn + '.tvg');
    if (!tf) continue;

    try {
      const d = parseTVG(await tf.async('arraybuffer'));
      if (externalColors.length > 0) resolveExternalPalette(d, externalColors);
      const element = elementMap.get(elementName);
      const viewport = (element?.fieldChart || 12) * TVG_UNITS_PER_FIELD || 336;
      const tb = await zip.file(tp).async('arraybuffer');
      const img = await new Promise(r => {
        const i = new Image();
        i.onload = () => r(i); i.onerror = () => r(null);
        i.src = URL.createObjectURL(new Blob([tb], {type: 'image/png'}));
      });
      if (!img) continue;
      const c = await renderTVGWithEmbeddedThumbnailFallback(d, SIZE, SIZE, viewport, { supersample: 2 }, img);
      if (!c) continue;

      const isBitmap = d.bitmapTiles.length > 0 && d.layers.every(l => l.shapes.length === 0);
      const scoreResult = scoreCanvasSources(img, c, SIZE, {
        tolerance: TOL,
        contentKind: isBitmap ? 'bitmap' : 'vector',
      });
      scores.push({
        n: tn,
        s: scoreResult.score,
        gate: scoreResult.gateScore,
        aligned: scoreResult.alignedScore,
        cropped: scoreResult.croppedAlignedScore,
        raw: scoreResult.rawScore,
        focused: scoreResult.normalizedScore,
        bitmap: isBitmap,
      });
    } catch (e) {}
  }

  scores.sort((a, b) => a.s - b.s);
  const vecScores = scores.filter(x => !x.bitmap);
  const bmpScores = scores.filter(x => x.bitmap);
  const avg = scores.reduce((s, x) => s + x.s, 0) / scores.length;
  const vecAvg = vecScores.length ? vecScores.reduce((s, x) => s + x.s, 0) / vecScores.length : 0;
  const gateAvg = scores.reduce((s, x) => s + x.gate, 0) / scores.length;
  const alignedAvg = scores.reduce((s, x) => s + x.aligned, 0) / scores.length;
  const croppedAvg = scores.reduce((s, x) => s + x.cropped, 0) / scores.length;
  const rawAvg = scores.reduce((s, x) => s + x.raw, 0) / scores.length;
  const focusedAvg = scores.reduce((s, x) => s + x.focused, 0) / scores.length;
  const gateVecAvg = vecScores.length ? vecScores.reduce((s, x) => s + x.gate, 0) / vecScores.length : 0;
  const alignedVecAvg = vecScores.length ? vecScores.reduce((s, x) => s + x.aligned, 0) / vecScores.length : 0;
  const croppedVecAvg = vecScores.length ? vecScores.reduce((s, x) => s + x.cropped, 0) / vecScores.length : 0;
  const rawVecAvg = vecScores.length ? vecScores.reduce((s, x) => s + x.raw, 0) / vecScores.length : 0;
  const focusedVecAvg = vecScores.length ? vecScores.reduce((s, x) => s + x.focused, 0) / vecScores.length : 0;
  const lines = [
    `ALL: ${avg.toFixed(1)}% final avg | ${gateAvg.toFixed(1)}% gate avg | ${alignedAvg.toFixed(1)}% aligned avg | ${croppedAvg.toFixed(1)}% cropped avg | ${rawAvg.toFixed(1)}% raw avg | ${focusedAvg.toFixed(1)}% focused avg (${scores.length} drawings) | >=98% gate: ${scores.filter(x => x.gate >= 98).length} | >=95% gate: ${scores.filter(x => x.gate >= 95).length} | >=90% gate: ${scores.filter(x => x.gate >= 90).length}`,
    `VECTOR: ${vecAvg.toFixed(1)}% final avg | ${gateVecAvg.toFixed(1)}% gate avg | ${alignedVecAvg.toFixed(1)}% aligned avg | ${croppedVecAvg.toFixed(1)}% cropped avg | ${rawVecAvg.toFixed(1)}% raw avg | ${focusedVecAvg.toFixed(1)}% focused avg (${vecScores.length}) | >=98% gate: ${vecScores.filter(x => x.gate >= 98).length} | >=95% gate: ${vecScores.filter(x => x.gate >= 95).length}`,
    `BITMAP: ${bmpScores.length ? (bmpScores.reduce((s,x) => s + x.s, 0) / bmpScores.length).toFixed(1) : 'N/A'}% final avg (${bmpScores.length})`,
    '',
    'Bottom 15 vectors:',
    ...vecScores.slice(0, 15).map(x => `  ${x.n}: ${x.s.toFixed(1)}% final | ${x.gate.toFixed(1)}% gate | ${x.aligned.toFixed(1)}% aligned | ${x.cropped.toFixed(1)}% cropped | ${x.raw.toFixed(1)}% raw | ${x.focused.toFixed(1)}% focused`),
  ];
  document.getElementById('out').textContent = lines.join('\n');
  document.title = 'DONE';
}
main().catch(e => { document.getElementById('out').textContent = 'ERROR: ' + e.message; document.title = 'DONE'; });
</script>
</body></html>
