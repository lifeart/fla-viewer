<!DOCTYPE html>
<html><head><title>Quality Test</title></head>
<body>
<pre id="out">Running...</pre>
<script type="module">
import JSZip from 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm';
import { parseTVG, resolveExternalPalette, renderTVGToCanvas, loadBitmapTiles } from './src/tvg-parser.ts';

const SIZE = 160, TOL = 50;
const ZIP = './sample/toon/CH_Anna_rig_football_suit_V001_V07.zip';

async function main() {
  const zip = await JSZip.loadAsync(await (await fetch(ZIP)).arrayBuffer());
  const thumbFiles = Object.keys(zip.files).filter(f => f.includes('.thumbnails/') && f.endsWith('.tvg.png'));
  const palFiles = Object.keys(zip.files).filter(f => f.includes('palette-library/') && f.endsWith('.plt'));
  const palCache = {};
  const scores = [];

  for (const tp of thumbFiles) {
    const parts = tp.split('/');
    const tn = parts.pop().replace(/^\./, '').replace('.tvg.png', '');
    const ed = parts.slice(0, -1).join('/') + '/';
    const tf = zip.file(ed + tn + '.tvg');
    if (!tf) continue;

    const pals = {};
    for (const pf of palFiles.filter(f => f.startsWith(ed))) {
      const n = pf.split('/').pop().replace('.plt', '');
      if (!palCache[pf]) palCache[pf] = await zip.file(pf).async('text');
      pals[n] = palCache[pf];
    }

    try {
      const d = parseTVG(await tf.async('arraybuffer'));
      for (const [n, x] of Object.entries(pals)) resolveExternalPalette(d, x, n);
      const c = renderTVGToCanvas(d, SIZE, SIZE, 336, { supersample: 2 });
      if (!c) continue;
      // Load bitmap tiles if present (async)
      await loadBitmapTiles(c);

      const tb = await zip.file(tp).async('arraybuffer');
      const img = await new Promise(r => {
        const i = new Image();
        i.onload = () => r(i); i.onerror = () => r(null);
        i.src = URL.createObjectURL(new Blob([tb], {type: 'image/png'}));
      });
      if (!img) continue;

      const cc = document.createElement('canvas');
      cc.width = SIZE; cc.height = SIZE;
      const cx = cc.getContext('2d');
      cx.fillStyle = '#fff'; cx.fillRect(0, 0, SIZE, SIZE);
      cx.drawImage(img, 0, 0, SIZE, SIZE);
      const rd = cx.getImageData(0, 0, SIZE, SIZE);
      cx.fillStyle = '#fff'; cx.fillRect(0, 0, SIZE, SIZE);
      cx.drawImage(c, 0, 0, SIZE, SIZE);
      const od = cx.getImageData(0, 0, SIZE, SIZE);

      let s = 0;
      for (let i = 0; i < SIZE * SIZE; i++) {
        const x = i * 4;
        if (Math.abs(rd.data[x] - od.data[x]) <= TOL &&
            Math.abs(rd.data[x+1] - od.data[x+1]) <= TOL &&
            Math.abs(rd.data[x+2] - od.data[x+2]) <= TOL) s++;
      }
      const isBitmap = d.bitmapTiles.length > 0 && d.layers.every(l => l.shapes.length === 0);
      scores.push({n: tn, s: s / (SIZE * SIZE) * 100, bitmap: isBitmap});
    } catch (e) {}
  }

  scores.sort((a, b) => a.s - b.s);
  const vecScores = scores.filter(x => !x.bitmap);
  const bmpScores = scores.filter(x => x.bitmap);
  const avg = scores.reduce((s, x) => s + x.s, 0) / scores.length;
  const vecAvg = vecScores.length ? vecScores.reduce((s, x) => s + x.s, 0) / vecScores.length : 0;
  const lines = [
    `ALL: ${avg.toFixed(1)}% avg (${scores.length} drawings) | >=98%: ${scores.filter(x => x.s >= 98).length} | >=95%: ${scores.filter(x => x.s >= 95).length} | >=90%: ${scores.filter(x => x.s >= 90).length}`,
    `VECTOR: ${vecAvg.toFixed(1)}% avg (${vecScores.length}) | >=98%: ${vecScores.filter(x => x.s >= 98).length} | >=95%: ${vecScores.filter(x => x.s >= 95).length}`,
    `BITMAP: ${bmpScores.length ? (bmpScores.reduce((s,x) => s + x.s, 0) / bmpScores.length).toFixed(1) : 'N/A'}% avg (${bmpScores.length})`,
    '',
    'Bottom 15 vectors:',
    ...vecScores.slice(0, 15).map(x => `  ${x.n}: ${x.s.toFixed(1)}%`),
  ];
  document.getElementById('out').textContent = lines.join('\n');
  document.title = 'DONE';
}
main().catch(e => { document.getElementById('out').textContent = 'ERROR: ' + e.message; document.title = 'DONE'; });
</script>
</body></html>
