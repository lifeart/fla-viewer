<!DOCTYPE html>
<html>
<head><title>Hand Test</title></head>
<body style="background:#fff;margin:20px;">
<div id="out" style="display:flex;flex-wrap:wrap;gap:10px;"></div>
<script type="module">
import JSZip from 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm';
import { parseTVG, resolveExternalPalette, renderTVGToCanvas } from './src/tvg-parser.ts';

const ZIP_URL = './sample/toon/CH_Anna_rig_football_suit_V001_V07.zip';
const ELEMENT = 'F-Hand_OL_1_F';
const DRAWINGS = [11, 1, 3, 14, 21, 23];
const SIZE = 160;

async function main() {
  const resp = await fetch(ZIP_URL);
  const buf = await resp.arrayBuffer();
  const zip = await JSZip.loadAsync(buf);

  const prefix = Object.keys(zip.files).find(f => f.includes(ELEMENT + '/'))?.split(ELEMENT)[0] + ELEMENT + '/';

  const palFiles = Object.keys(zip.files).filter(f => f.includes('palette-library/') && f.endsWith('.plt'));
  const palettes = {};
  for (const pf of palFiles) {
    const name = pf.split('/').pop().replace('.plt', '');
    palettes[name] = await zip.file(pf).async('text');
  }

  const out = document.getElementById('out');

  for (const num of DRAWINGS) {
    const drawingName = `${ELEMENT}-${num}`;
    const tvgPath = prefix + drawingName + '.tvg';
    const tvgFile = zip.file(tvgPath);
    if (!tvgFile) continue;

    const tvgBuf = await tvgFile.async('arraybuffer');
    const drawing = parseTVG(tvgBuf);
    for (const [name, xml] of Object.entries(palettes)) {
      resolveExternalPalette(drawing, xml, name);
    }

    const thumbFile = zip.file(prefix + `.thumbnails/.${drawingName}.tvg.png`);
    let thumbUrl = null;
    if (thumbFile) {
      const tBuf = await thumbFile.async('arraybuffer');
      thumbUrl = URL.createObjectURL(new Blob([tBuf], {type:'image/png'}));
    }

    const canvas = renderTVGToCanvas(drawing, SIZE, SIZE, 336);

    const div = document.createElement('div');
    div.style.textAlign = 'center';
    div.innerHTML = `<div style="font-size:11px;margin-bottom:2px">#${num}</div>`;
    const row = document.createElement('div');
    row.style.display = 'flex';
    row.style.gap = '4px';

    if (thumbUrl) {
      const img = new Image();
      img.src = thumbUrl;
      img.style.width = SIZE + 'px';
      img.style.height = SIZE + 'px';
      img.style.border = '1px solid #ccc';
      row.appendChild(img);
    }
    if (canvas) {
      canvas.style.width = SIZE + 'px';
      canvas.style.height = SIZE + 'px';
      canvas.style.border = '1px solid #ccc';
      row.appendChild(canvas);
    }
    div.appendChild(row);
    out.appendChild(div);
  }

  document.title = 'DONE';
}
main().catch(e => { document.title = 'ERROR'; console.error(e); });
</script>
</body>
</html>
