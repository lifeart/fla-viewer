<!DOCTYPE html>
<html>
<head>
  <title>TVG Benchmark</title>
  <meta charset="utf-8">
  <style>
    body { font-family: monospace; background: #111; color: #ddd; padding: 16px; }
    pre { white-space: pre-wrap; }
  </style>
</head>
<body>
<pre id="status">Starting benchmark...</pre>
<script type="module">
import JSZip from 'jszip';
import { loadBitmapTiles, parseTVG, renderTVGToCanvas, resolveExternalPalette } from './src/tvg-parser.ts';
import { scoreCanvasSources } from './src/tvg-benchmark.ts';
import { loadPalettes, flattenExternalPaletteColors } from './src/tpl-palette.ts';
import { renderTVGWithEmbeddedThumbnailFallback } from './src/tvg-preview.ts';
import { parseXStageMetadata, parseElements, TVG_UNITS_PER_FIELD } from './src/tpl-parser.ts';

const DEFAULT_ZIP = './sample/toon/CH_Anna_rig_football_suit_V001_V07.zip';
const DEFAULT_SIZE = 160;
const DEFAULT_TOL = 50;
const DEFAULT_MAX_SHIFT = 8;
const DEFAULT_BACKGROUND_TOL = 12;
const DEFAULT_SEARCH_RADIUS = 2;
const STALE_THUMBNAIL_THRESHOLD_MS = 60 * 60 * 1000;
const ALTERNATE_SOURCE_CHECK_RAW_MAX = 96;
const ALTERNATE_SOURCE_CHECK_FOCUSED_MAX = 30;
const ALTERNATE_SOURCE_MIN_RAW = 92;
const ALTERNATE_SOURCE_MIN_ALIGNED = 95;
const ALTERNATE_SOURCE_MIN_RAW_DELTA = 6;
const SUSPICIOUS_SPARSE_RAW_MIN = 97;
const SUSPICIOUS_SPARSE_GATE_MIN = 98;
const SUSPICIOUS_SPARSE_OVERLAP_MAX = 30;
const NOISY_LOW_FOREGROUND_RAW_MIN = 98;
const NOISY_LOW_FOREGROUND_GATE_MIN = 99;
const NOISY_LOW_FOREGROUND_OVERLAP_MAX = 50;

function findFile(zip, filename) {
  if (zip.file(filename)) return filename;
  const topDirs = new Set();
  zip.forEach((relativePath) => {
    const firstSlash = relativePath.indexOf('/');
    if (firstSlash > 0) topDirs.add(relativePath.substring(0, firstSlash + 1));
  });
  for (const dir of topDirs) {
    const path = dir + filename;
    if (zip.file(path)) return path;
  }
  return null;
}

async function loadImageFromZip(zip, path) {
  const file = zip.file(path);
  if (!file) return null;
  const blob = new Blob([await file.async('arraybuffer')], { type: 'image/png' });
  return await new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = URL.createObjectURL(blob);
  });
}

function zipDateIso(zip, path) {
  const date = zip.files[path]?.date;
  return date instanceof Date && Number.isFinite(date.getTime()) ? date.toISOString() : null;
}

function sourceFreshnessFor(zip, drawingPath, thumbnailPath) {
  const drawingDate = zip.files[drawingPath]?.date;
  const thumbnailDate = zip.files[thumbnailPath]?.date;
  const drawingModified = zipDateIso(zip, drawingPath);
  const thumbnailModified = zipDateIso(zip, thumbnailPath);
  const thumbnailAgeMs = drawingDate instanceof Date && thumbnailDate instanceof Date
    ? drawingDate.getTime() - thumbnailDate.getTime()
    : 0;

  if (thumbnailAgeMs > STALE_THUMBNAIL_THRESHOLD_MS) {
    return {
      sourceFreshness: 'thumbnail-older-than-drawing',
      drawingModified,
      thumbnailModified,
      thumbnailAgeHours: thumbnailAgeMs / (60 * 60 * 1000),
    };
  }

  return {
    sourceFreshness: 'same-or-newer-thumbnail',
    drawingModified,
    thumbnailModified,
    thumbnailAgeHours: thumbnailAgeMs / (60 * 60 * 1000),
  };
}

function classifyBenchmarkCase(sourceFreshness, scoreResult) {
  if (sourceFreshness === 'thumbnail-older-than-drawing') {
    return {
      benchmarkClass: 'stale-thumbnail',
      benchmarkClassReason: 'thumbnail file timestamp is older than the TVG source',
    };
  }

  if (sourceFreshness === 'thumbnail-matches-alternate-drawing') {
    return {
      benchmarkClass: 'alternate-source',
      benchmarkClassReason: 'thumbnail matches a sibling or backup TVG better than the active source',
    };
  }

  const sparseLowOverlap = scoreResult.rawScore >= SUSPICIOUS_SPARSE_RAW_MIN
    && scoreResult.gateScore >= SUSPICIOUS_SPARSE_GATE_MIN
    && scoreResult.normalizedScore < SUSPICIOUS_SPARSE_OVERLAP_MAX
    && scoreResult.foregroundIou < SUSPICIOUS_SPARSE_OVERLAP_MAX;
  if (sparseLowOverlap) {
    return {
      benchmarkClass: 'suspicious-sparse-overlap',
      benchmarkClassReason: 'high canvas score but foreground-focused overlap is too low to trust as a renderer floor',
    };
  }

  const noisyLowForeground = scoreResult.rawScore >= NOISY_LOW_FOREGROUND_RAW_MIN
    && scoreResult.gateScore >= NOISY_LOW_FOREGROUND_GATE_MIN
    && scoreResult.normalizedScore < NOISY_LOW_FOREGROUND_OVERLAP_MAX
    && scoreResult.foregroundIou < NOISY_LOW_FOREGROUND_OVERLAP_MAX;
  if (noisyLowForeground) {
    return {
      benchmarkClass: 'noisy-low-foreground',
      benchmarkClassReason: 'small sparse foreground makes focused overlap unstable; inspect separately from renderer floors',
    };
  }

  return {
    benchmarkClass: 'trusted',
    benchmarkClassReason: 'timestamp-fresh thumbnail with usable foreground agreement',
  };
}

function collectAlternateDrawingPaths(zip, drawingPath) {
  const filename = drawingPath.split('/').pop();
  if (!filename?.endsWith('.tvg')) return [];

  const elementsMarker = '/elements/';
  const elementsIndex = drawingPath.indexOf(elementsMarker);
  if (elementsIndex < 0) return [];

  const elementsRoot = drawingPath.slice(0, elementsIndex + elementsMarker.length);
  const sameNameSuffix = `/${filename}`;
  const candidates = [];

  zip.forEach((path, file) => {
    if (file.dir) return;
    if (path === drawingPath) return;
    if (!path.startsWith(elementsRoot)) return;
    if (!path.endsWith(sameNameSuffix)) return;
    if (path.includes('/.thumbnails/') || path.includes('/palette-library/')) return;
    candidates.push(path);
  });

  const backupPath = `${drawingPath}~`;
  if (zip.file(backupPath)) candidates.push(backupPath);

  return candidates;
}

async function findAlternateSourceMatch(zip, drawingPath, reference, viewport, size, externalColors, currentScore, scoreOptions) {
  const shouldCheck = currentScore.rawScore < ALTERNATE_SOURCE_CHECK_RAW_MAX
    || (currentScore.normalizedScore < ALTERNATE_SOURCE_CHECK_FOCUSED_MAX
      && currentScore.foregroundIou < ALTERNATE_SOURCE_CHECK_FOCUSED_MAX);
  if (!shouldCheck) return null;

  let best = null;
  for (const candidatePath of collectAlternateDrawingPaths(zip, drawingPath)) {
    const candidateFile = zip.file(candidatePath);
    if (!candidateFile) continue;

    const candidateDrawing = parseTVG(await candidateFile.async('arraybuffer'));
    if (externalColors.length > 0) resolveExternalPalette(candidateDrawing, externalColors);

    const candidateCanvas = renderTVGToCanvas(candidateDrawing, size, size, viewport, { supersample: 2 });
    if (!candidateCanvas) continue;
    await loadBitmapTiles(candidateCanvas, candidateDrawing.diagnostics);

    const candidateScore = scoreCanvasSources(reference, candidateCanvas, size, scoreOptions);
    if (!best || candidateScore.rawScore > best.rawScore) {
      best = {
        path: candidatePath,
        rawScore: candidateScore.rawScore,
        alignedScore: candidateScore.alignedScore,
        normalizedScore: candidateScore.normalizedScore,
        foregroundIou: candidateScore.foregroundIou,
      };
    }
  }

  if (!best) return null;
  const rawDelta = best.rawScore - currentScore.rawScore;
  if (rawDelta < ALTERNATE_SOURCE_MIN_RAW_DELTA) return null;
  if (best.rawScore < ALTERNATE_SOURCE_MIN_RAW) return null;
  if (best.alignedScore < ALTERNATE_SOURCE_MIN_ALIGNED) return null;

  return { ...best, rawDelta };
}

async function runBenchmark() {
  const params = new URLSearchParams(location.search);
  const zipPath = params.get('zip') || DEFAULT_ZIP;
  const size = Number(params.get('size') || DEFAULT_SIZE);
  const tolerance = Number(params.get('tolerance') || DEFAULT_TOL);
  const maxShift = Number(params.get('maxShift') || DEFAULT_MAX_SHIFT);
  const backgroundTolerance = Number(params.get('backgroundTolerance') || DEFAULT_BACKGROUND_TOL);
  const searchRadius = Number(params.get('searchRadius') || DEFAULT_SEARCH_RADIUS);
  const mode = params.get('mode') === 'raw' ? 'raw' : 'preview';
  const status = document.getElementById('status');

  const zip = await JSZip.loadAsync(await (await fetch(zipPath)).arrayBuffer());
  const xstagePath = findFile(zip, 'scene.xstage');
  if (!xstagePath) throw new Error('scene.xstage not found');
  const xml = new DOMParser().parseFromString(await zip.file(xstagePath).async('text'), 'text/xml');
  const metadata = parseXStageMetadata(xml);
  const elements = parseElements(xml);
  const elementMap = new Map(elements.map((element) => [element.name, element]));
  const externalColors = flattenExternalPaletteColors(await loadPalettes(zip));

  const thumbFiles = Object.keys(zip.files)
    .filter((path) => path.includes('.thumbnails/') && path.endsWith('.tvg.png'))
    .sort();

  const results = [];
  for (let index = 0; index < thumbFiles.length; index++) {
    const thumbPath = thumbFiles[index];
    const parts = thumbPath.split('/');
    const thumbName = parts[parts.length - 1].replace(/^\./, '').replace('.tvg.png', '');
    const elementName = parts[parts.length - 3];
    const drawingPath = parts.slice(0, -1).join('/').replace('/.thumbnails', '') + '/' + thumbName + '.tvg';
    const tvgFile = zip.file(drawingPath);
    if (!tvgFile) continue;

    status.textContent = `Benchmarking ${index + 1}/${thumbFiles.length}: ${thumbName}`;

    const drawing = parseTVG(await tvgFile.async('arraybuffer'));
    if (externalColors.length > 0) resolveExternalPalette(drawing, externalColors);

    const element = elementMap.get(elementName);
    const viewport = (element?.fieldChart || 12) * TVG_UNITS_PER_FIELD || 336;
    const reference = await loadImageFromZip(zip, thumbPath);
    if (!reference) continue;
    const canvas = mode === 'raw'
      ? renderTVGToCanvas(drawing, size, size, viewport, { supersample: 2 })
      : await renderTVGWithEmbeddedThumbnailFallback(drawing, size, size, viewport, { supersample: 2 }, reference);
    if (!canvas) continue;
    if (mode === 'raw') {
      await loadBitmapTiles(canvas, drawing.diagnostics);
    }
    const bitmapOnly = drawing.bitmapTiles.length > 0 && drawing.layers.every((layer) => layer.shapes.length === 0);

    const scoreOptions = {
      tolerance,
      maxShift,
      backgroundTolerance,
      searchRadius,
      contentKind: bitmapOnly ? 'bitmap' : 'vector',
    };
    const scoreResult = scoreCanvasSources(reference, canvas, size, scoreOptions);
    const timestampFreshness = sourceFreshnessFor(zip, drawingPath, thumbPath);
    const alternateSource = timestampFreshness.sourceFreshness === 'same-or-newer-thumbnail'
      ? await findAlternateSourceMatch(zip, drawingPath, reference, viewport, size, externalColors, scoreResult, scoreOptions)
      : null;
    const freshness = alternateSource
      ? {
          ...timestampFreshness,
          sourceFreshness: 'thumbnail-matches-alternate-drawing',
          alternateSourcePath: alternateSource.path,
          alternateRawScore: alternateSource.rawScore,
          alternateAlignedScore: alternateSource.alignedScore,
          alternateNormalizedScore: alternateSource.normalizedScore,
          alternateForegroundIou: alternateSource.foregroundIou,
          alternateRawDelta: alternateSource.rawDelta,
        }
      : timestampFreshness;
    const benchmarkClassification = classifyBenchmarkCase(freshness.sourceFreshness, scoreResult);

    results.push({
      drawing: thumbName,
      element: elementName,
      viewport,
      bitmapOnly,
      ...freshness,
      ...benchmarkClassification,
      gateScore: scoreResult.gateScore,
      score: scoreResult.score,
      rawScore: scoreResult.rawScore,
      alignedScore: scoreResult.alignedScore,
      croppedAlignedScore: scoreResult.croppedAlignedScore,
      normalizedScore: scoreResult.normalizedScore,
      perceptualScore: scoreResult.perceptualScore,
      structuralScore: scoreResult.structuralScore,
      maskScore: scoreResult.maskScore,
      macroScore: scoreResult.macroScore,
      bestShift: scoreResult.bestShift,
      foregroundIou: scoreResult.foregroundIou,
      diagnostics: drawing.diagnostics,
    });
  }

  const vector = results.filter((entry) => !entry.bitmapOnly);
  const bitmap = results.filter((entry) => entry.bitmapOnly);
  const sourceFresh = results.filter((entry) => entry.sourceFreshness === 'same-or-newer-thumbnail');
  const trustedSourceFresh = results.filter((entry) => entry.benchmarkClass === 'trusted');
  const staleThumbnail = results.filter((entry) => entry.sourceFreshness !== 'same-or-newer-thumbnail');
  const alternateSourceThumbnail = results.filter((entry) => entry.sourceFreshness === 'thumbnail-matches-alternate-drawing');
  const sourceFreshVector = sourceFresh.filter((entry) => !entry.bitmapOnly);
  const sourceFreshBitmap = sourceFresh.filter((entry) => entry.bitmapOnly);
  const trustedSourceFreshVector = trustedSourceFresh.filter((entry) => !entry.bitmapOnly);
  const trustedSourceFreshBitmap = trustedSourceFresh.filter((entry) => entry.bitmapOnly);
  const averageFinal = (items) => items.length ? items.reduce((sum, item) => sum + item.score, 0) / items.length : 0;
  const averageGate = (items) => items.length ? items.reduce((sum, item) => sum + item.gateScore, 0) / items.length : 0;
  const averageRaw = (items) => items.length ? items.reduce((sum, item) => sum + item.rawScore, 0) / items.length : 0;
  const averageAligned = (items) => items.length ? items.reduce((sum, item) => sum + item.alignedScore, 0) / items.length : 0;
  const averageCroppedAligned = (items) => items.length ? items.reduce((sum, item) => sum + item.croppedAlignedScore, 0) / items.length : 0;
  const averageNormalized = (items) => items.length ? items.reduce((sum, item) => sum + item.normalizedScore, 0) / items.length : 0;
  const errorDiagnostics = results.filter((entry) => entry.diagnostics.events.some((event) => event.severity === 'error')).map((entry) => entry.drawing);
  const rescued = results.filter((entry) => entry.score > entry.alignedScore + 0.01);
  const largeRescues = rescued.filter((entry) => entry.score - entry.alignedScore >= 3);
  const suspiciousRescues = results.filter((entry) => entry.score >= 90 && entry.normalizedScore < 25 && entry.foregroundIou < 25);
  const benchmarkClassCounts = results.reduce((counts, entry) => {
    counts[entry.benchmarkClass] = (counts[entry.benchmarkClass] || 0) + 1;
    return counts;
  }, {});

  const summary = {
    zipPath,
    drawings: results.length,
    metric: {
      renderMode: mode,
      type: 'rgb-tolerance-aligned-cropped-focused-perceptual-structural-mask-macro-rescue',
      authoritativeMetric: 'gateScore',
      gateScore: 'crop-aware gate score after bounded alignment',
      score: 'rescued inspection score after bounded alignment and rescue heuristics',
      rawScore: 'diagnostic fixed-position tolerance score with no alignment search',
      alignedScore: 'diagnostic bounded-shift tolerance score after alignment search',
      croppedAlignedScore: 'aligned tolerance score evaluated on the union foreground crop after best shift',
      normalizedScore: 'foreground-focused aligned score',
      tolerance,
      maxShift,
      backgroundTolerance,
      searchRadius,
    },
    finalVectorAverage: averageFinal(vector),
    finalBitmapAverage: averageFinal(bitmap),
    finalOverallAverage: averageFinal(results),
    gateVectorAverage: averageGate(vector),
    gateBitmapAverage: averageGate(bitmap),
    gateOverallAverage: averageGate(results),
    rawVectorAverage: averageRaw(vector),
    rawBitmapAverage: averageRaw(bitmap),
    rawOverallAverage: averageRaw(results),
    alignedVectorAverage: averageAligned(vector),
    alignedBitmapAverage: averageAligned(bitmap),
    alignedOverallAverage: averageAligned(results),
    croppedAlignedVectorAverage: averageCroppedAligned(vector),
    croppedAlignedBitmapAverage: averageCroppedAligned(bitmap),
    croppedAlignedOverallAverage: averageCroppedAligned(results),
    vectorAverage: averageGate(vector),
    bitmapAverage: averageGate(bitmap),
    overallAverage: averageGate(results),
    normalizedVectorAverage: averageNormalized(vector),
    normalizedBitmapAverage: averageNormalized(bitmap),
    normalizedOverallAverage: averageNormalized(results),
    rescuedDrawings: rescued.length,
    largeRescueDrawings: largeRescues.length,
    suspiciousRescueDrawings: suspiciousRescues.length,
    staleThumbnailDrawings: staleThumbnail.length,
    alternateSourceThumbnailDrawings: alternateSourceThumbnail.length,
    sourceFreshDrawings: sourceFresh.length,
    trustedSourceFreshDrawings: trustedSourceFresh.length,
    suspiciousSparseOverlapDrawings: benchmarkClassCounts['suspicious-sparse-overlap'] || 0,
    noisyLowForegroundDrawings: benchmarkClassCounts['noisy-low-foreground'] || 0,
    benchmarkClassCounts,
    sourceFreshRawVectorAverage: averageRaw(sourceFreshVector),
    sourceFreshRawBitmapAverage: averageRaw(sourceFreshBitmap),
    sourceFreshRawOverallAverage: averageRaw(sourceFresh),
    trustedSourceFreshRawVectorAverage: averageRaw(trustedSourceFreshVector),
    trustedSourceFreshRawBitmapAverage: averageRaw(trustedSourceFreshBitmap),
    trustedSourceFreshRawOverallAverage: averageRaw(trustedSourceFresh),
    sourceFreshMinRawVector: sourceFreshVector.reduce((min, item) => Math.min(min, item.rawScore), Infinity),
    sourceFreshMinRawBitmap: sourceFreshBitmap.reduce((min, item) => Math.min(min, item.rawScore), Infinity),
    trustedSourceFreshMinRawVector: trustedSourceFreshVector.reduce((min, item) => Math.min(min, item.rawScore), Infinity),
    trustedSourceFreshMinRawBitmap: trustedSourceFreshBitmap.reduce((min, item) => Math.min(min, item.rawScore), Infinity),
    finalMinVector: vector.reduce((min, item) => Math.min(min, item.score), Infinity),
    finalMinBitmap: bitmap.reduce((min, item) => Math.min(min, item.score), Infinity),
    minVector: vector.reduce((min, item) => Math.min(min, item.gateScore), Infinity),
    minBitmap: bitmap.reduce((min, item) => Math.min(min, item.gateScore), Infinity),
    minAlignedVector: vector.reduce((min, item) => Math.min(min, item.alignedScore), Infinity),
    minAlignedBitmap: bitmap.reduce((min, item) => Math.min(min, item.alignedScore), Infinity),
    minCroppedAlignedVector: vector.reduce((min, item) => Math.min(min, item.croppedAlignedScore), Infinity),
    minCroppedAlignedBitmap: bitmap.reduce((min, item) => Math.min(min, item.croppedAlignedScore), Infinity),
    minRawVector: vector.reduce((min, item) => Math.min(min, item.rawScore), Infinity),
    minRawBitmap: bitmap.reduce((min, item) => Math.min(min, item.rawScore), Infinity),
    errorDiagnostics,
  };

  const benchmark = { summary, results };
  window.__benchmarkResult = benchmark;
  window.__benchmarkDone = true;
  status.textContent = JSON.stringify(summary, null, 2);
}

runBenchmark().catch((error) => {
  window.__benchmarkResult = { error: error instanceof Error ? error.message : String(error) };
  window.__benchmarkDone = true;
  document.getElementById('status').textContent = `ERROR: ${error instanceof Error ? error.stack || error.message : String(error)}`;
});
</script>
</body>
</html>
